name: cy_scanner
description: Application de scan de billets pour événements HelloAsso
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Code scanner
  mobile_scanner: ^5.1.0

  # HTTP
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Storage sécurisé (token admin)
  flutter_secure_storage: ^9.0.0

  # Permissions caméra
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1

  # File picker pour CSV
  file_picker: ^8.0.3

  # Partage / téléchargement fichiers
  share_plus: ^10.0.0
  path_provider: ^2.1.3

  # Animations
  lottie: ^3.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/cyscan_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
